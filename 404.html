<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect trick
    // Simpan path ke sessionStorage lalu redirect ke index.html
    var path = window.location.pathname;
    var base = '/command-center-pamtas';
    sessionStorage.setItem('redirect', path.replace(base, '') || '/');
    window.location.replace(base + '/');
  </script>
</head>
<body></body>
</html>
